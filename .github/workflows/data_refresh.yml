name: Weekly COVID-19 Data Refresh

on:
  schedule:
    # Runs every Sunday at 2:00 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  refresh-data:
    name: ETL Pipeline — Refresh Data
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    permissions:
      contents: write  # Allow push back to repo
    
    steps:
      # ── Step 1: Checkout code ──────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── Step 2: Set up Python ──────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── Step 3: Install dependencies ──────────────────────────────────────
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Step 4: Run ETL pipeline ───────────────────────────────────────────
      - name: Run ETL Pipeline
        run: |
          python scripts/etl_pipeline.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      # ── Step 5: Validate outputs ───────────────────────────────────────────
      - name: Validate ETL Outputs
        run: |
          python -c "
          import pandas as pd
          import sys
          
          files = [
              'data/processed/covid_global.csv',
              'data/processed/covid_monthly.csv',
              'data/processed/covid_latest.csv',
              'data/processed/dim_country.csv',
              'data/processed/dim_date.csv',
          ]
          
          for f in files:
              df = pd.read_csv(f)
              assert len(df) > 0, f'{f} is empty!'
              print(f'  ✓ {f}: {len(df)} rows, {len(df.columns)} columns')
          
          # Critical column null checks
          global_df = pd.read_csv('data/processed/covid_global.csv')
          assert global_df['Country'].notna().all(), 'Null countries found!'
          assert global_df['Date'].notna().all(), 'Null dates found!'
          assert global_df['Confirmed'].ge(0).all(), 'Negative cases found!'
          
          print()
          print('All validation checks passed!')
          print(f'Date range: {global_df[\"Date\"].min()} to {global_df[\"Date\"].max()}')
          print(f'Countries: {global_df[\"Country\"].nunique()}')
          print(f'Total rows: {len(global_df)}')
          "

      # ── Step 6: Commit updated data back to repo ──────────────────────────
      - name: Commit Updated Data Files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git add data/processed/*.csv
          git add data/etl_log.txt || true
          git diff --staged --quiet || git commit -m "🔄 Auto-refresh: Updated processed data [$(date -u '+%Y-%m-%d %H:%M UTC')]"

      # ── Step 7: Push changes ────────────────────────────────────────────────
      - name: Push Changes
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}

      # ── Step 8: Upload artifacts for inspection ────────────────────────────
      - name: Upload Processed Data as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: processed-covid-data-${{ github.run_id }}
          path: data/processed/
          retention-days: 30

      # ── Notify on failure ──────────────────────────────────────────────────
      - name: Notify on Failure
        if: failure()
        run: |
          echo "ETL Pipeline failed! Check the logs above."
          echo "Common issues:"
          echo "  1. JHU or OWID data source URL changed"
          echo "  2. Network timeout (retry with workflow_dispatch)"
          echo "  3. Data format changes in source CSVs"
